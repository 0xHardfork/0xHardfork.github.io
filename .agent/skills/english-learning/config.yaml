# Dialogue type options
dialogue_types:
  - name: "meeting"
    name_cn: "会议"
    description: "Formal meeting context"
    
  - name: "casual"
    name_cn: "日常同事沟通"
    description: "Informal communication"

# Language settings
languages:
  - chinese
  - english
  - japanese

# Dialogue generation parameters
dialogue_parameters:
  min_exchanges: 10
  max_exchanges: 15
  min_speakers: 2
  max_speakers: 4
  
# History settings
history:
  max_recent_scenarios: 10  # Number of recent scenarios to track
  avoid_repeat_days: 3       # Avoid repeating scenarios within this many days
