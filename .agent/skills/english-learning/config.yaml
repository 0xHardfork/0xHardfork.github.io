# Configuration for English Learning Skill

# Current difficulty level
# Options: elementary (初级), intermediate (中级), advanced (高级)
difficulty: intermediate

# IT/Computer Related Scenarios
it_scenarios:
  # Development & Coding
  - name: "Code Review Discussion"
    name_cn: "代码审查讨论"
    description: "Reviewing pull requests and discussing code quality"
    
  - name: "Sprint Planning Meeting"
    name_cn: "敏捷冲刺规划会议"
    description: "Planning tasks for the upcoming sprint"
    
  - name: "Debugging Session"
    name_cn: "调试会话"
    description: "Collaborative debugging and problem-solving"
    
  - name: "Technical Design Discussion"
    name_cn: "技术设计讨论"
    description: "Discussing system architecture and design patterns"
    
  - name: "API Integration Planning"
    name_cn: "API集成规划"
    description: "Planning how to integrate with external APIs"
    
  # DevOps & Infrastructure
  - name: "Deployment Discussion"
    name_cn: "部署讨论"
    description: "Planning and troubleshooting deployments"
    
  - name: "Performance Optimization"
    name_cn: "性能优化"
    description: "Discussing application performance improvements"
    
  - name: "Security Review"
    name_cn: "安全审查"
    description: "Reviewing security practices and vulnerabilities"
    
  # DevSecOps & Cloud Security
  - name: "DevSecOps Pipeline"
    name_cn: "DevSecOps流水线"
    description: "Discussing security integration in CI/CD pipelines"
    
  - name: "Cloud Security Review"
    name_cn: "云安全审查"
    description: "Reviewing cloud infrastructure security and compliance"
    
  - name: "Container Security"
    name_cn: "容器安全"
    description: "Discussing Docker and container security best practices"
    
  - name: "Infrastructure as Code Review"
    name_cn: "基础设施即代码审查"
    description: "Reviewing Terraform, CloudFormation security configurations"
    
  - name: "Kubernetes Security"
    name_cn: "Kubernetes安全"
    description: "Discussing K8s security, RBAC, and pod security policies"
    
  - name: "Zero Trust Architecture"
    name_cn: "零信任架构"
    description: "Planning zero trust security implementation"
    
  # Meetings & Communication
  - name: "Stand-up Meeting"
    name_cn: "每日站会"
    description: "Daily team synchronization meeting"
    
  - name: "Tech Talk Discussion"
    name_cn: "技术分享讨论"
    description: "Discussing new technologies or learning topics"
    
  - name: "Incident Response"
    name_cn: "事故响应"
    description: "Handling production incidents and outages"
    
  - name: "Requirements Gathering"
    name_cn: "需求收集"
    description: "Discussing project requirements with stakeholders"

